<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" shape-rendering="crispEdges">
  <!-- cabeca -->
  <rect x="5" y="1" width="6" height="6" fill="#f5cba7"/>
  <!-- olhos -->
  <rect x="6" y="3" width="1" height="1" fill="#1a1209"/>
  <rect x="9" y="3" width="1" height="1" fill="#1a1209"/>
  <!-- boca -->
  <rect x="7" y="5" width="2" height="1" fill="#c0392b"/>
  <!-- cabelo lateral -->
  <rect x="4" y="1" width="1" height="3" fill="#2c2c2c"/>
  <rect x="11" y="1" width="1" height="3" fill="#2c2c2c"/>
  <!-- cartola -->
  <rect x="5" y="0" width="6" height="1" fill="#1a1209"/>
  <rect x="4" y="1" width="8" height="1" fill="#1a1209"/>
  <!-- faixa cartola -->
  <rect x="5" y="1" width="6" height="1" fill="#c8960c"/>
  <!-- corpo - casaca preta -->
  <rect x="4" y="7" width="8" height="7" fill="#2c2c2c"/>
  <!-- camisa branca -->
  <rect x="6" y="7" width="4" height="5" fill="#f0e8d0"/>
