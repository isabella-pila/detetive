  <!-- maos -->
  <rect x="1" y="11" width="2" height="2" fill="#f5cba7"/>
  <rect x="13" y="11" width="2" height="2" fill="#f5cba7"/>
  <!-- pernas -->
  <rect x="5" y="14" width="3" height="4" fill="#1a1209"/>
  <rect x="8" y="14" width="3" height="4" fill="#1a1209"/>
  <!-- sapatos -->
  <rect x="4" y="18" width="4" height="2" fill="#0a0a0a"/>
  <rect x="8" y="18" width="4" height="2" fill="#0a0a0a"/>
