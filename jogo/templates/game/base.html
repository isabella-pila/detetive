<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Murdle — Mistério na Mansão{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1a1209;
    --parch:     #f2e8cc;
    --parch-dim: #c8b98a;
    --gold:      #c8960c;
    --gold-dim:  rgba(200,150,12,.25);
    --blood:     #8b1a1a;
    --blood-lt:  #c0392b;
    --smoke:     #6b6355;
    --fog:       #9a9080;
    --card-bg:   rgba(255,255,255,.04);
    --card-br:   rgba(200,150,12,.18);
    --radius:    4px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--parch);
    min-height: 100vh;
  }

  /* grid lines background */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      repeating-linear-gradient(0deg,  transparent, transparent 79px, rgba(255,255,255,.018) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,.018) 80px);
  }


  /* ── typography ── */
  .serif   { font-family: 'Playfair Display', serif; }
  .mono    { font-family: 'DM Mono', monospace; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); }

  /* ── card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-br);
    border-radius: var(--radius);
    padding: 1.4rem 1.6rem;
  }

  /* ── buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: background .18s;
    text-decoration: none;
  }
  .btn:hover { background: var(--gold-dim); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-blood { border-color: var(--blood-lt); color: var(--blood-lt); }
  .btn-blood:hover { background: rgba(139,26,26,.2); }
  .btn-lg { padding: 13px 32px; font-size: 12px; }

  /* ── inputs ── */
  input[type=text], input[type=password], select, textarea {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(200,150,12,.2);
    border-radius: var(--radius);
    color: var(--parch);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 9px 12px;
    outline: none; transition: border-color .2s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  input::placeholder, textarea::placeholder { color: var(--smoke); }
  option { background: #1a1209; }
  textarea { resize: none; }

  /* ── messages (Django) ── */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; }
  .alert-error { background: rgba(139,26,26,.15); border: 1px solid rgba(192,57,43,.3); color: #f5a0a0; }

  /* ── loading dots ── */
  .dots span {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--gold); margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(200,150,12,.3); border-radius: 2px; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="wrap">
  {% block content %}{% endblock %}
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
